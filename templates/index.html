<!DOCTYPE html>
<html>
<head><title>Fake News</title></head>
<body style="font-family:Arial;text-align:center;margin-top:100px;">
<h2>Fake News Detection</h2>
<form method="POST">
<textarea name="news" rows="5" cols="50"></textarea><br><br>
<button type="submit">Check</button>
</form>

{% if result %}
<h3>{{ result }}</h3>
{% endif %}

</body>
</html>
